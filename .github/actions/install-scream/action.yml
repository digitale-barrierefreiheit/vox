# Installs the Scream virtual audio render device so headless WASAPI integration
# tests have a real device. Shared by the windows and windows-de-DE CI jobs so
# the security-sensitive logic (hash pinning, cert trust, driver install) cannot
# drift between them. (Workflow/action YAML is exempt from the SPDX-header check.)
name: Install Scream virtual audio
description: Provision the Scream virtual audio render device on a Windows runner.
runs:
  using: composite
  steps:
    - shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        # Pin the exact release asset and signing certificate we trust.
        $expectedZipHash = 'FA33E25F9A46C61E4E0CD83362C51C3D2A45C6FE4091AAD7507E240E40F1A520'
        $expectedThumbprint = 'B2353603B4837C7A86A01D12A2B34DA7B5F2D368'
        Invoke-WebRequest -Uri https://github.com/duncanthrax/scream/releases/download/4.0/Scream4.0.zip -OutFile Scream.zip -TimeoutSec 120
        if ((Get-FileHash Scream.zip -Algorithm SHA256).Hash -ne $expectedZipHash) { throw "Scream.zip SHA256 mismatch" }
        Expand-Archive -Path Scream.zip -DestinationPath Scream
        # Scream is self-signed, so x64 Driver Signature Enforcement loads it only
        # when the (pinned) signing cert is a trusted Root; TrustedPublisher also
        # makes the install unattended (no prompt).
        $cert = (Get-AuthenticodeSignature "Scream\Install\driver\x64\Scream.sys").SignerCertificate
        if (-not $cert -or $cert.Thumbprint -ne $expectedThumbprint) { throw "Unexpected Scream cert: $($cert.Thumbprint)" }
        foreach ($name in 'Root', 'TrustedPublisher') {
          $store = [System.Security.Cryptography.X509Certificates.X509Store]::new($name, 'LocalMachine')
          $store.Open('ReadWrite'); $store.Add($cert); $store.Close()
        }
        # Stage the driver into the store WITHOUT /install: /install triggers a
        # PnP device install that hangs headless. Then create the root device
        # node with devcon, which also hangs in its post-create "updating drivers"
        # phase even though the node is created — so time-box devcon and verify
        # the endpoint actually came up (PnP binds the staged driver in the
        # background).
        Start-Service audiosrv
        pnputil /add-driver "Scream\Install\driver\x64\Scream.inf"
        $devcon = Start-Process -FilePath "Scream\Install\helpers\devcon-x64.exe" `
          -ArgumentList 'install','Scream\Install\driver\x64\Scream.inf','*Scream' -PassThru -NoNewWindow
        if (-not $devcon.WaitForExit(60000)) {
          Write-Host "devcon did not return in 60s; device node is created, continuing."
          Stop-Process -Id $devcon.Id -Force -ErrorAction SilentlyContinue
        }
        Start-Sleep -Seconds 15
        $scream = Get-PnpDevice -ErrorAction SilentlyContinue |
          Where-Object { $_.FriendlyName -like '*Scream*' -or $_.InstanceId -like '*SCREAM*' }
        if (-not $scream) { throw "Scream device did not appear after install" }
        Write-Host "Scream device: $($scream.FriendlyName) [$($scream.Status)]"
