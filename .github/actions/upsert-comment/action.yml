# Post or update a single PR comment identified by a hidden marker (so re-runs update the
# same comment instead of stacking new ones). Used for the SonarQube and clang-tidy
# summary comments (#65). Inputs are passed via env, not script interpolation, to avoid
# injection. No-op when not a pull_request event.
name: Upsert PR comment
description: Create or update one marker-tagged comment on the current PR.
inputs:
  marker:
    description: 'Hidden HTML-comment marker that identifies this comment, e.g. <!-- vox-sonar -->.'
    required: true
  body-file:
    description: 'Path to a file containing the full comment body (must include the marker).'
    required: true
runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      env:
        MARKER: ${{ inputs.marker }}
        BODY_FILE: ${{ inputs.body-file }}
      with:
        script: |
          const fs = require('fs');
          if (!context.payload.pull_request) {
            core.info('Not a pull_request event — skipping comment.');
            return;
          }
          const marker = process.env.MARKER;
          const body = fs.existsSync(process.env.BODY_FILE) ? fs.readFileSync(process.env.BODY_FILE, 'utf8') : '';
          if (!body.trim()) {
            core.warning(`upsert-comment: ${process.env.BODY_FILE} is empty — skipping.`);
            return;
          }
          if (!body.includes(marker)) {
            core.warning(`upsert-comment: body is missing its marker ${marker} — skipping (it could not be found on re-runs).`);
            return;
          }
          const issue = { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.payload.pull_request.number };
          const comments = await github.paginate(github.rest.issues.listComments, { ...issue, per_page: 100 });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner: issue.owner, repo: issue.repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ ...issue, body });
          }
