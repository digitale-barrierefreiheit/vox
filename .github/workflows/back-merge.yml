# After anything lands on `main` (a release), back-merge `main` into `dev` so `dev`
# never falls behind `main`. This keeps the "require branches up to date" (strict)
# rule on `main` — which we keep on for quality — from blocking the next
# `dev -> main` release PR.
#
# Mechanism: push to the protected `dev` branch using a write DEPLOY KEY, which is a
# bypass actor (actor_type: DeployKey) on `dev`'s ruleset. Repo-scoped, not
# person-bound, no PAT. Provide the deploy key's private half as the repo secret
# `BACKMERGE_SSH_KEY`; the job no-ops with a warning if it is absent.
#
# Credentials & key handling: we check out WITHOUT persisting any credentials (so the
# default GITHUB_TOKEN is never written to .git/config), then configure the deploy key
# explicitly for the fetch/push. The private key is written to a per-job temp file (never
# ~/.ssh), GitHub's host keys are pinned via ssh-keyscan (no blind TOFU), and a final
# always() step removes the key even if the push failed. (`token: ""` is NOT an option:
# checkout rejects an empty token. `persist-credentials: false` together with `ssh-key` is
# also no good: checkout removes the SSH key on the same cleanup, so a later push has no key.)
name: Back-merge main to dev

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize so two quick releases can't race on the dev ref.
concurrency:
  group: back-merge-main-to-dev
  cancel-in-progress: false

jobs:
  back-merge:
    runs-on: ubuntu-24.04
    steps:
      - name: Check for the deploy-key secret
        id: guard
        env:
          KEY: ${{ secrets.BACKMERGE_SSH_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::BACKMERGE_SSH_KEY is not set; skipping the back-merge."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out dev (no persisted credentials)
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Merge main into dev and push with the deploy key
        if: steps.guard.outputs.run == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.BACKMERGE_SSH_KEY }}
        run: |
          # Write the deploy key to a per-job temp file (never ~/.ssh), created with strict
          # perms; the always() step below removes it even if this step fails. Pin GitHub's
          # host keys via ssh-keyscan rather than blindly trusting whatever is presented.
          key_file="$RUNNER_TEMP/backmerge_key"
          known_hosts="$RUNNER_TEMP/known_hosts"
          (umask 077; printf '%s\n' "$DEPLOY_KEY" > "$key_file")
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com > "$known_hosts" 2>/dev/null
          if [ ! -s "$known_hosts" ]; then
            echo "::error::ssh-keyscan returned no host keys for github.com."
            exit 1
          fi
          export GIT_SSH_COMMAND="ssh -i $key_file -o IdentitiesOnly=yes -o UserKnownHostsFile=$known_hosts -o StrictHostKeyChecking=yes"
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"

          git config user.name "vox back-merge"
          git config user.email "actions@github.com"
          git fetch origin main
          if git merge --no-edit -m "chore: back-merge main into dev" origin/main; then
            git push origin HEAD:dev
            echo "dev is up to date with main."
          else
            echo "::error::Back-merge hit a conflict; resolve dev <- main manually."
            git merge --abort || true
            exit 1
          fi

      - name: Remove the deploy key (always, even on failure)
        if: always()
        run: rm -f "$RUNNER_TEMP/backmerge_key" "$RUNNER_TEMP/known_hosts"
