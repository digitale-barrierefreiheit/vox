# SPDX note: workflow YAML is not part of the SPDX-header check set.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # vcpkg registry commit the build is pinned to. MUST stay in sync with
  # "builtin-baseline" in vcpkg.json: run-vcpkg checks out vcpkg at exactly this
  # commit, so the baseline is always resolvable and port versions are
  # reproducible (architecture §8.6.7). Do not rely on the runner's preinstalled
  # vcpkg — its commit drifts with the image and may not contain the baseline.
  VCPKG_BASELINE: "059d760472984042e1b4db0d40efd935a1adcbc9"

jobs:
  # ---------------------------------------------------------------------------
  # Fast, dependency-free gates: license headers and code formatting.
  # ---------------------------------------------------------------------------
  license-headers:
    name: license-headers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Check SPDX headers
        run: python3 tools/check-license-headers.py

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: python3 tools/run-clang-format.py --check --clang-format clang-format-18

  # ---------------------------------------------------------------------------
  # Shipping toolchain: MSVC, static CRT, 64-bit and 32-bit (R12 wire layout).
  # ---------------------------------------------------------------------------
  windows:
    name: windows-${{ matrix.arch }}-msvc
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msvc_arch: amd64
            configure_preset: x64-msvc
            build_preset: x64-msvc-release
            test_preset: x64-msvc-release
          - arch: x86
            msvc_arch: amd64_x86
            configure_preset: x86-msvc
            build_preset: x86-msvc-release
            test_preset: x86-msvc-release
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@v4.3.3
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}
      # run-vcpkg runs AFTER the MSVC env so its VCPKG_ROOT is not clobbered by
      # the vcvars that ship with Visual Studio's bundled vcpkg.
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }}
      - name: Test
        run: ctest --preset ${{ matrix.test_preset }}

  # ---------------------------------------------------------------------------
  # German speech integration (ADR-07). GitHub Windows runners ship English-only,
  # so the default windows job only exercises the SAPI fallback path. Here we
  # provision the de-DE text-to-speech voice and bridge its OneCore token into
  # the classic SAPI5 registry that ISpVoice enumerates, then run the suite with
  # VOX_REQUIRE_GERMAN_VOICE=1 so a missing or SAPI-invisible German voice fails
  # the build instead of silently falling back to English. x64 only: the German
  # TTS engine is 64-bit. NOTE: this depends on Features-on-Demand and the
  # registry bridge; if it proves flaky, downgrade to a non-gating job.
  windows-de-DE:
    name: windows-x64-msvc-de-DE
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@v4.3.3
      - name: Install the German text-to-speech voice
        shell: pwsh
        run: |
          # Discover the capability by prefix so we don't pin a version that may
          # differ across runner images. Log all de-DE capabilities for triage.
          $deDE = Get-WindowsCapability -Online | Where-Object { $_.Name -like '*de-DE*' }
          Write-Host "de-DE capabilities on this image:"
          $deDE | ForEach-Object { Write-Host "  - $($_.Name) [$($_.State)]" }
          $tts = $deDE | Where-Object { $_.Name -like 'Language.TextToSpeech~~~de-DE~*' } | Select-Object -First 1
          if (-not $tts) { throw "No de-DE TextToSpeech capability is available on this runner image." }
          if ($tts.State -ne 'Installed') {
            Add-WindowsCapability -Online -Name $tts.Name -ErrorAction Stop | Out-Null
          }
          Write-Host "Installed voice capability: $($tts.Name)"
      - name: Bridge the OneCore voice token into the classic SAPI registry
        shell: pwsh
        run: |
          # Language-pack voices register under Speech_OneCore, which classic
          # SAPI5 (ISpVoice / SPCAT_VOICES) does not enumerate. Copy the tokens
          # into the classic hive so the engine can find the German voice. (The
          # broader fix — enumerating OneCore directly — is tracked separately.)
          $src = 'HKLM\SOFTWARE\Microsoft\Speech_OneCore\Voices\Tokens'
          $dst = 'HKLM\SOFTWARE\Microsoft\Speech\Voices\Tokens'
          reg copy "$src" "$dst" /s /f
          if ($LASTEXITCODE -ne 0) { throw "reg copy of voice tokens failed ($LASTEXITCODE)" }
          reg query "$dst"
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Configure
        run: cmake --preset x64-msvc
      - name: Build
        run: cmake --build --preset x64-msvc-release
      - name: Test (German voice required)
        env:
          VOX_REQUIRE_GERMAN_VOICE: "1"
        run: ctest --preset x64-msvc-release

  # ---------------------------------------------------------------------------
  # Static analysis: clang-tidy over the compile database (incl. Core Guidelines).
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@v4.3.3
      - name: Install LLVM tools
        run: sudo apt-get update && sudo apt-get install -y clang-18 clang-tidy-18 clang-tools-18 ninja-build
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Configure (generates compile_commands.json)
        run: cmake --preset linux-clang
        env:
          CC: clang-18
          CXX: clang++-18
      - name: Run clang-tidy
        run: |
          run-clang-tidy-18 -p build/linux-clang -warnings-as-errors='*' \
            $(git ls-files 'src/*.cpp' 'tests/*.cpp')

  # ---------------------------------------------------------------------------
  # Sanitizer matrix on the OS-independent cores (ASan+UBSan, TSan) — ADR-14.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: linux-clang-${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, tsan]
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@v4.3.3
      - name: Install Clang + sanitizer runtimes
        run: sudo apt-get update && sudo apt-get install -y clang-18 ninja-build
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Configure
        run: cmake --preset linux-clang-${{ matrix.sanitizer }}
      - name: Build
        run: cmake --build --preset linux-clang-${{ matrix.sanitizer }}
      - name: Test
        run: ctest --preset linux-clang-${{ matrix.sanitizer }}
