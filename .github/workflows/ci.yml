# SPDX note: workflow YAML is not part of the SPDX-header check set.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Fast, dependency-free gates: license headers and code formatting.
  # ---------------------------------------------------------------------------
  license-headers:
    name: license-headers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Check SPDX headers
        run: python3 tools/check-license-headers.py

  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: python3 tools/run-clang-format.py --check --clang-format clang-format-18

  # ---------------------------------------------------------------------------
  # Test-results matrix (#65). Post the per-run PR comment at the start of the run; each
  # test job below folds in its column as it finishes (.github/actions/test-matrix). A new
  # run id gets a fresh comment.
  # ---------------------------------------------------------------------------
  test-comment-init:
    name: test-results comment
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-matrix
        with:
          mode: init

  # ---------------------------------------------------------------------------
  # Shipping toolchain: MSVC, static CRT, 64-bit and 32-bit (R12 wire layout).
  # Both arches install the VB-CABLE virtual audio device and run the WASAPI render
  # integration test with VOX_REQUIRE_AUDIO_DEVICE=1 (ADR-10), so a missing or
  # broken device fails the build rather than silently skipping. This is the
  # English runner — the SAPI German tests skip here; the de-DE path is the
  # separate job below. NOTE: the audio device is a third-party signed-driver
  # install; if it proves flaky, drop the require flag (the test then skips).
  # ---------------------------------------------------------------------------
  windows:
    name: windows-${{ matrix.arch }}-msvc
    runs-on: windows-2025
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msvc_arch: amd64
            test_preset: x64-msvc-release
          - arch: x86
            msvc_arch: amd64_x86
            test_preset: x86-msvc-release
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install the VB-CABLE virtual audio device
        timeout-minutes: 5
        uses: ./.github/actions/install-vbcable
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.msvc_arch }}
      # run-vcpkg runs AFTER the MSVC env so its VCPKG_ROOT is not clobbered by
      # the vcvars that ship with Visual Studio's bundled vcpkg.
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      # `just test` depends on `build`, so this single step builds and runs the suite.
      - name: Build + test (audio device required)
        env:
          VOX_REQUIRE_AUDIO_DEVICE: "1"
          VOX_REQUIRE_UIA_TREE: "1" # the UIA provider integration test (#40)
        run: just test ${{ matrix.test_preset }}
      - name: Report test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/test-matrix
        with:
          mode: report
          job: ${{ matrix.arch }}

  # ---------------------------------------------------------------------------
  # German speech integration (ADR-07) + audio. Augments an x64 runner with the
  # de-DE TTS voice (bridged from Speech_OneCore into the classic SAPI hive) and
  # the VB-CABLE virtual audio device, then runs the suite with both
  # VOX_REQUIRE_GERMAN_VOICE=1 and VOX_REQUIRE_AUDIO_DEVICE=1 — so a missing
  # German voice OR render device fails the build. x64 only: the German TTS
  # engine is 64-bit. NOTE: depends on Features-on-Demand, a registry bridge, and
  # a third-party signed driver; if it proves flaky, drop the require flags.
  # ---------------------------------------------------------------------------
  windows-de-DE:
    name: windows-x64-msvc-de-DE
    runs-on: windows-2025
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install the German text-to-speech voice
        shell: pwsh
        run: |
          # Discover the capability by prefix so we don't pin a version that may
          # differ across runner images. Log all de-DE capabilities for triage.
          $deDE = Get-WindowsCapability -Online | Where-Object { $_.Name -like '*de-DE*' }
          Write-Host "de-DE capabilities on this image:"
          $deDE | ForEach-Object { Write-Host "  - $($_.Name) [$($_.State)]" }
          $tts = $deDE | Where-Object { $_.Name -like 'Language.TextToSpeech~~~de-DE~*' } | Select-Object -First 1
          if (-not $tts) { throw "No de-DE TextToSpeech capability is available on this runner image." }
          if ($tts.State -ne 'Installed') {
            Add-WindowsCapability -Online -Name $tts.Name -ErrorAction Stop | Out-Null
          }
          Write-Host "Installed voice capability: $($tts.Name)"
      - name: Bridge the OneCore voice token into the classic SAPI registry
        shell: pwsh
        run: |
          # Language-pack voices register under Speech_OneCore, which classic
          # SAPI5 (ISpVoice / SPCAT_VOICES) does not enumerate. Copy the tokens
          # into the classic hive so the engine can find the German voice. (The
          # broader fix — enumerating OneCore directly — is tracked in #52.)
          $src = 'HKLM\SOFTWARE\Microsoft\Speech_OneCore\Voices\Tokens'
          $dst = 'HKLM\SOFTWARE\Microsoft\Speech\Voices\Tokens'
          reg copy "$src" "$dst" /s /f
          if ($LASTEXITCODE -ne 0) { throw "reg copy of voice tokens failed ($LASTEXITCODE)" }
          reg query "$dst"
      - name: Install the VB-CABLE virtual audio device
        timeout-minutes: 5
        uses: ./.github/actions/install-vbcable
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: amd64
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      # `just test` depends on `build`, so this single step builds and runs the suite.
      - name: Build + test (German voice + audio device required)
        env:
          VOX_REQUIRE_GERMAN_VOICE: "1"
          VOX_REQUIRE_AUDIO_DEVICE: "1"
          VOX_REQUIRE_UIA_TREE: "1" # the UIA provider integration test (#40)
        run: just test x64-msvc-release
      - name: Report test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/test-matrix
        with:
          mode: report
          job: de-DE

  # ---------------------------------------------------------------------------
  # Performance gate (#41, §8.6.4): time-to-first-audio microbenchmarks with
  # percentile budgets. The pipeline benchmark enforces its absolute budget
  # in-process (p99 ≤ 10% of the 200 ms Q1 budget); the real-SAPI first-chunk
  # benchmark measures the true synthesis start against Q1 (German voice set up
  # as in windows-de-DE; no audio device needed — it synthesizes to memory).
  # The pipeline percentiles are additionally compared against the dev baseline
  # (the benchmark-data branch) with a generous relative threshold: hosted
  # runners are noisy, so the absolute in-process budget stays authoritative.
  # This job is read-only (it runs PR code); publishing the dev baseline needs
  # contents:write and lives in the separate benchmarks-baseline job below,
  # which runs only on dev pushes (trusted code).
  # ---------------------------------------------------------------------------
  benchmarks:
    name: benchmarks-ttfa
    runs-on: windows-2025
    permissions:
      contents: read
      pull-requests: write # per-run results comment + regression alerts
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install the German text-to-speech voice
        shell: pwsh
        run: |
          # Same discovery as windows-de-DE: find the capability by prefix.
          $deDE = Get-WindowsCapability -Online | Where-Object { $_.Name -like '*de-DE*' }
          $tts = $deDE | Where-Object { $_.Name -like 'Language.TextToSpeech~~~de-DE~*' } | Select-Object -First 1
          if (-not $tts) { throw "No de-DE TextToSpeech capability is available on this runner image." }
          if ($tts.State -ne 'Installed') {
            Add-WindowsCapability -Online -Name $tts.Name -ErrorAction Stop | Out-Null
          }
          Write-Host "Installed voice capability: $($tts.Name)"
      - name: Bridge the OneCore voice token into the classic SAPI registry
        shell: pwsh
        run: |
          # As in windows-de-DE; the direct OneCore enumeration is tracked in #52.
          reg copy 'HKLM\SOFTWARE\Microsoft\Speech_OneCore\Voices\Tokens' 'HKLM\SOFTWARE\Microsoft\Speech\Voices\Tokens' /s /f
          if ($LASTEXITCODE -ne 0) { throw "reg copy of voice tokens failed ($LASTEXITCODE)" }
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: amd64
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Build + run the microbenchmarks (absolute budgets enforced)
        id: bench
        env:
          VOX_BENCH_SAPI: "1"
          VOX_REQUIRE_TTFA_BUDGET: "1"
        run: just bench
      # Per-run results summary + PR comment (#65 run-summaries pattern), posted
      # on success AND failure — a blown budget should be readable at a glance.
      - name: Build benchmark summary + comment
        if: ${{ !cancelled() }}
        continue-on-error: true
        shell: bash
        run: |
          {
            echo '<!-- vox-benchmarks run=${{ github.run_id }} -->'
            echo '## 📈 TTFA benchmarks — run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            if [ "${{ steps.bench.outcome }}" = success ]; then
              echo '✅ All latency budgets held.'
            else
              echo '❌ Benchmark run failed — a latency budget was exceeded or the harness errored (see the job log).'
            fi
            if [ -f benchmark-results.json ]; then
              echo ''
              echo '| Benchmark | p50 | p99 | p99.9 | Budget |'
              echo '|---|--:|--:|--:|---|'
              jq -r -f tools/bench-summary.jq benchmark-results.json
            fi
          } > benchmark-comment.md
          cat benchmark-comment.md >> "$GITHUB_STEP_SUMMARY"
      - name: Post benchmark PR comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: ./.github/actions/upsert-comment
        with:
          marker: '<!-- vox-benchmarks run=${{ github.run_id }} -->'
          body-file: benchmark-comment.md
      - name: Convert the pipeline percentiles for the baseline comparison
        shell: bash
        run: jq -f tools/bench-to-action.jq benchmark-results.json > benchmark-data.json
      # PRs: compare against the latest dev baseline (read-only), alert + fail
      # on a relative regression. The baseline itself is published by the
      # benchmarks-baseline job on dev pushes.
      - name: Compare against the dev baseline
        if: ${{ github.event_name == 'pull_request' }}
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: TTFA pipeline
          tool: customSmallerIsBetter
          output-file-path: benchmark-data.json
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: ttfa
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: 200%
          comment-on-alert: true
          fail-on-alert: true
          summary-always: true
          auto-push: false
          save-data-file: false
      - name: Hand the percentiles to the baseline job
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-data
          path: benchmark-data.json

  # ---------------------------------------------------------------------------
  # Publishes the dev baseline (benchmark-data branch) from the benchmarks job's
  # converted percentiles. Separate job so contents:write is only ever granted
  # to trusted dev-push code, never to PR code (least privilege).
  # ---------------------------------------------------------------------------
  benchmarks-baseline:
    name: benchmarks-baseline (dev)
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/dev' }}
    needs: benchmarks
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the new baseline to the benchmark-data branch
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: benchmark-data
      - name: Store the new dev baseline
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: TTFA pipeline
          tool: customSmallerIsBetter
          output-file-path: benchmark-data.json
          gh-pages-branch: benchmark-data
          benchmark-data-dir-path: ttfa
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          auto-push: true

  # ---------------------------------------------------------------------------
  # Static analysis: clang-tidy over the compile database (incl. Core Guidelines).
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # post the clang-tidy summary comment on PRs
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install LLVM tools
        run: sudo apt-get update && sudo apt-get install -y clang-18 clang-tidy-18 clang-tools-18 ninja-build
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      # `just tidy` configures linux-clang (compile_commands.json) then runs
      # run-clang-tidy-18 — the justfile's Linux default. CLANG_TIDY is set here only to
      # pin that exact parallel, versioned wrapper explicitly for CI.
      - name: Run clang-tidy
        id: tidy
        run: |
          set -o pipefail  # explicit: the step must fail on tidy issues, not mask them via tee
          just tidy 2>&1 | tee tidy.log
        env:
          CC: clang-18
          CXX: clang++-18
          CLANG_TIDY: run-clang-tidy-18
      # Post on a real pass/fail, but not when the run was cancelled (e.g. superseded by a
      # newer push) — a cancelled tidy step is not a clang-tidy failure.
      - name: Build clang-tidy comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        continue-on-error: true
        run: |
          {
            echo '<!-- vox-clang-tidy run=${{ github.run_id }} -->'
            echo '## 🧹 clang-tidy — run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            if [ "${{ steps.tidy.outcome }}" = success ]; then
              echo '✅ No issues.'
            else
              echo '❌ clang-tidy reported issues:'
              echo ''
              echo '<details><summary>Last 60 lines of output</summary>'
              echo ''
              echo '```'
              tail -n 60 tidy.log
              echo '```'
              echo ''
              echo '</details>'
            fi
          } > clang-tidy-comment.md
      - name: Post clang-tidy PR comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: ./.github/actions/upsert-comment
        with:
          marker: '<!-- vox-clang-tidy run=${{ github.run_id }} -->'
          body-file: clang-tidy-comment.md

  # ---------------------------------------------------------------------------
  # Sanitizer matrix on the OS-independent cores (ASan+UBSan, TSan) — ADR-14.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: linux-clang-${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, tsan]
    env:
      CC: clang-18
      CXX: clang++-18
    steps:
      - uses: actions/checkout@v6
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Install Clang + sanitizer runtimes
        run: sudo apt-get update && sudo apt-get install -y clang-18 ninja-build
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      # `just test` depends on `build`, so this single step builds and runs the suite.
      - name: Build + test
        run: just test linux-clang-${{ matrix.sanitizer }}
      - name: Report test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/test-matrix
        with:
          mode: report
          job: ${{ matrix.sanitizer }}

  # ---------------------------------------------------------------------------
  # The test-matrix action is TypeScript bundled with ncc — type-check it, run its unit
  # tests, and verify the committed dist/ is in sync with src/ (rebuild + diff).
  # ---------------------------------------------------------------------------
  test-matrix-action:
    name: test-matrix action (build + dist sync)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .github/actions/test-matrix
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # --ignore-scripts: don't run dependency lifecycle scripts on install (supply-chain).
      - run: npm ci --ignore-scripts
      # `npm run check` = tsc --noEmit && unit tests && ncc build, all via local bins (no npx).
      - name: Type-check, test, and rebuild the bundle
        run: npm run check
      - name: Verify dist/ is committed and up to date
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::.github/actions/test-matrix/dist is stale — run 'npm run build' there and commit it."
            git --no-pager diff --stat -- dist
            exit 1
          fi
