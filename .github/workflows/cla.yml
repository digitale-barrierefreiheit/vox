name: CLA

# Gates every pull request on a signed Contributor License Agreement (CLA.md).
# Uses CLA Assistant Lite: signatures are stored as a JSON file in THIS repo on
# the branch named below.
#
# No secret needed: because signatures live in this same repository, the built-in
# GITHUB_TOKEN does everything (comment on PRs, commit the signatures file, set
# the status check). The job's `permissions:` block grants it the scopes, and
# `pull_request_target` ensures the token has write access even for fork PRs.
# This action does not check out or run PR code, so pull_request_target is safe
# here.
#
# A Personal Access Token is only required if you later move the signatures store
# to a SEPARATE repository (which GITHUB_TOKEN cannot reach); in that case set the
# repository secret PERSONAL_ACCESS_TOKEN to a fine-grained PAT and reference it
# below instead of GITHUB_TOKEN.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-24.04
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'I have read the CLA document and I hereby sign the CLA!')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # PR comments / status checks.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature-file storage. Same repo → the built-in token suffices.
          # Swap to ${{ secrets.PERSONAL_ACCESS_TOKEN }} only for a separate store.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: ".github/cla/signatures.json"
          path-to-document: "https://github.com/digitale-barrierefreiheit/vox/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],bot*"
          custom-pr-sign-comment: "I have read the CLA document and I hereby sign the CLA!"
          custom-notsigned-prcomment: >
            Thank you for your pull request. Before we can merge it, please sign
            our [Contributor License Agreement](https://github.com/digitale-barrierefreiheit/vox/blob/main/CLA.md)
            by posting the following comment on this PR:
