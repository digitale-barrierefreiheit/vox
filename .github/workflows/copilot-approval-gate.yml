# Approval gate for PRs into `main`.
#
# A solo code owner cannot self-approve their own release PR, so instead of an admin
# bypass (which performs no review at all) we automate the *approval* — gated on either
# a strict Copilot review or an explicit code-owner comment — and keep the *merge* a
# manual human (code-owner) action. Either approval counts toward the single required
# review (the repo allows Actions to approve), making the PR mergeable.
#
# Path A — Copilot review:
#   1. On a PR into `main`, post a comment with a strict review prompt for Copilot.
#   2. A maintainer triggers a Copilot review (the org's Copilot is unconfigured, so this
#      is manual via a personal seat).
#   3. When the Copilot review bot submits a review whose body STARTS WITH the exact line
#      "OK, I APPROVE", this workflow approves the PR with GITHUB_TOKEN.
#
# Path B — code-owner comment:
#   A user listed in CODEOWNERS comments a line starting with "I approve it!" on the PR;
#   this workflow approves on their behalf. This is the reliable path when the author IS
#   the (solo) code owner and therefore cannot click "Approve" themselves.
#
# Security:
#   - Path A acts ONLY on reviews whose author login EXACTLY matches the Copilot review bot
#     — `copilot-pull-request-reviewer[bot]`, overridable via the `COPILOT_REVIEWER_LOGIN`
#     repo variable. A substring match would be too weak: other bot accounts (e.g. this
#     repo's `copilot-swe-agent`, or a malicious `notcopilot[bot]`) could satisfy it and
#     self-approve. The verdict must START the body, so a quoted/incidental mention cannot
#     trigger it.
#   - Path B verifies the commenter is BOTH listed in CODEOWNERS AND currently has write
#     access, so a random contributor cannot self-approve by typing the phrase.
#   - Neither path merges — a person still pulls the trigger.
name: Approval gate

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  prompt:
    name: Post the review prompt
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Comment with the strict review prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body "$(cat <<'BODY'
          You opened this pull request as a code owner, so you cannot approve it yourself.
          It can be approved automatically in one of two ways.

          **1. Copilot review.** Request a Copilot review (Reviewers → Copilot). Then:

          **@copilot** Please review this pull request **very strictly**:

          - Were the coding guidelines respected (`AGENTS.md`, `doc/architecture`)?
          - Is everything well covered by automated tests?
          - Did you find anything that is a security problem or could be considered harmful?
          - Is everything green (build, tests, linters/analyzers — no errors or warnings)?

          **State your verdict on the very first line of the review, verbatim, with no
          heading, quoting, or preamble before it:**
          - If nothing critical blocks a release, the first line must be exactly: OK, I APPROVE
          - Otherwise, the first line must be exactly: STOP — then explain what to fix.

          **2. Code-owner approval.** A code owner may instead approve by posting a comment
          that starts with exactly: I approve it!
          BODY
          )"

  approve-on-copilot-review:
    name: Approve when Copilot says OK
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.review.user.type == 'Bot' &&
      github.event.review.user.login == (vars.COPILOT_REVIEWER_LOGIN || 'copilot-pull-request-reviewer[bot]') &&
      startsWith(github.event.review.body, 'OK, I APPROVE')
    runs-on: ubuntu-24.04
    steps:
      - name: Approve the pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          echo "Copilot ($REVIEWER) opened its review with OK, I APPROVE on PR #$PR — approving."
          gh pr review "$PR" --repo "$REPO" --approve \
            --body "Auto-approved: Copilot's strict review returned **OK, I APPROVE**. A code owner still performs the merge."

  approve-on-codeowner-comment:
    name: Approve when a code owner says so
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, 'I approve it!')
    runs-on: ubuntu-24.04
    steps:
      - name: Approve when the commenter is a code owner
        uses: actions/github-script@v9
        with:
          script: |
            const pr_number = context.issue.number;
            const commenter = context.payload.comment.user.login;

            // Only gate releases into `main`.
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo, pull_number: pr_number,
            });
            if (pr.base.ref !== 'main') {
              core.info(`PR #${pr_number} targets ${pr.base.ref}, not main; skipping.`);
              return;
            }
            if (pr.state !== 'open') {
              core.info(`PR #${pr_number} is ${pr.state}; skipping.`);
              return;
            }

            // The commenter must currently have write access...
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              ...context.repo, username: commenter,
            });
            if (perm.permission !== 'admin' && perm.permission !== 'write') {
              core.info(`${commenter} has '${perm.permission}' permission (need write+); skipping.`);
              return;
            }

            // ...AND be listed as a code owner in CODEOWNERS.
            const owners = await readCodeowners();
            if (!owners.has(commenter.toLowerCase())) {
              core.info(`${commenter} is not listed in CODEOWNERS; skipping.`);
              return;
            }

            await github.rest.pulls.createReview({
              ...context.repo, pull_number: pr_number, event: 'APPROVE',
              body: `Auto-approved: code owner @${commenter} commented the approval phrase. A code owner still performs the merge.`,
            });
            core.info(`Approved PR #${pr_number} on code-owner comment by ${commenter}.`);

            // Collect the set of code-owner logins from CODEOWNERS (teams expanded best-effort).
            async function readCodeowners() {
              const owners = new Set();
              let text = null;
              for (const path of ['.github/CODEOWNERS', 'CODEOWNERS', 'docs/CODEOWNERS']) {
                try {
                  const { data } = await github.rest.repos.getContent({ ...context.repo, path });
                  text = Buffer.from(data.content, 'base64').toString('utf8');
                  break;
                } catch (error) {
                  /* try the next standard location */
                }
              }
              if (text === null) {
                core.info('No CODEOWNERS file found.');
                return owners;
              }
              for (const rawLine of text.split(/\r?\n/)) {
                const line = rawLine.replace(/#.*$/, '').trim();
                if (!line) continue;
                const handles = line.split(/\s+/).slice(1).filter((token) => token.startsWith('@'));
                for (const handle of handles) {
                  const name = handle.slice(1);
                  if (name.includes('/')) {
                    const [org, team_slug] = name.split('/');
                    try {
                      const members = await github.paginate(github.rest.teams.listMembersInOrg, { org, team_slug });
                      for (const member of members) owners.add(member.login.toLowerCase());
                    } catch (error) {
                      core.info(`Could not expand team ${name}: ${error.message}`);
                    }
                  } else {
                    owners.add(name.toLowerCase());
                  }
                }
              }
              return owners;
            }
