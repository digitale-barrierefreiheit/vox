# Refresh the cost-ledger snapshot MONTHLY. Runs tools/cost_collector.py for the last
# complete calendar month and writes the result to the orphan `cost-data` branch
# (snapshot.md) — never to dev/main, so a data refresh never triggers the build / test /
# Sonar / benchmark pipelines (same pattern as the benchmark-data and cla-signatures
# branches). Methodology lives in doc/cost-ledger.md on the code branches; the AI-review and
# Claude-token figures are fed in by cost-contribution.yml (also on cost-data) and read here via
# --ai-review / --claude. See issue #76 / #128 / #142.
name: Cost ledger collector

on:
  schedule:
    - cron: '17 6 1 * *' # 06:17 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      month:
        description: 'Target month YYYY-MM. Blank = last complete month (the scheduled default). Set it to preview the current, still-open month or to backfill a past one.'
        required: false
        type: string
        default: ''

permissions: {}

# Serialize every cost-data writer (this workflow and cost-contribution.yml share the
# group) so two runs can never race on a push to the cost-data branch.
concurrency:
  group: cost-data-write
  cancel-in-progress: false

jobs:
  collect:
    name: Refresh the cost ledger
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the cost-data branch (never dev/main)
      actions: read # read workflow runs/jobs for the Actions-minutes line
    steps:
      - name: Check out the code (for tools/cost_collector.py)
        uses: actions/checkout@v6
      - name: Check out the cost-data branch (the data lives here)
        uses: actions/checkout@v6
        with:
          ref: cost-data
          path: cost-data
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Mint a short-lived installation token from the org-owned GitHub App (Organization
      # -> Administration: read) for the billing cross-check. continue-on-error so that when
      # the App is not configured the read falls back to the COST_BILLING_TOKEN PAT (or,
      # absent both, "not configured (prerequisite)").
      - name: Mint org-billing token (GitHub App, if configured)
        id: app_token
        if: ${{ vars.COST_APP_CLIENT_ID != '' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.COST_APP_CLIENT_ID }}
          private-key: ${{ secrets.COST_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Refresh the snapshot on the cost-data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COST_BILLING_TOKEN: ${{ steps.app_token.outputs.token || secrets.COST_BILLING_TOKEN }}
          # Read the dispatch input via env (never interpolate ${{ }} into the shell) so a
          # crafted value can't inject commands. Empty for scheduled runs.
          INPUT_MONTH: ${{ github.event.inputs.month }}
        run: |
          # Pick the target month: an explicit dispatch input (preview/backfill) wins, else
          # close out the last complete calendar month. Validate the shape here so a typo fails
          # fast — before any push to cost-data — even though the collector also checks --month.
          # Compute once and persist so the commit step reuses the exact value (a manual run
          # across a UTC month boundary can't drift).
          month="$INPUT_MONTH"
          if [ -z "$month" ]; then
            month="$(date -u -d 'last month' +%Y-%m)"
          elif ! printf '%s' "$month" | grep -Eq '^[0-9]{4}-(0[1-9]|1[0-2])$'; then
            echo "::error::month input must be YYYY-MM with a 01-12 month, got '$month'"
            exit 1
          fi
          echo "COST_MONTH=$month" >> "$GITHUB_ENV"
          python3 tools/cost_collector.py --month "$month" \
            --doc cost-data/snapshot.md \
            --ai-review cost-data/ai-review.json \
            --claude cost-data/claude.json
          {
            echo "## Cost ledger — $month"
            echo
            sed -n '/cost-snapshot:start/,/cost-snapshot:end/p' cost-data/snapshot.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Commit and push to cost-data (no PR, no CI)
        run: |
          cd cost-data
          git config user.name "vox cost collector"
          git config user.email "actions@github.com"
          # Stage first so the guard also detects a newly-created (untracked) file.
          git add snapshot.md
          if git diff --cached --quiet; then
            echo "Snapshot unchanged; nothing to do."
            exit 0
          fi
          git commit -m "chore(cost): refresh cost-ledger snapshot ($COST_MONTH)"
          # Serialized by the concurrency group; rebase defensively in case the branch
          # moved (e.g. a contribution push) between checkout and now, then push.
          git fetch origin cost-data
          git rebase origin/cost-data
          git push origin HEAD:cost-data
