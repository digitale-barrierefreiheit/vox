# SPDX-FileCopyrightText: 2026 Digitale Barrierefreiheit e.V. and the Vox contributors
# Record an externally-reported, maintainer-disclosed cost into the cost ledger. Two feeds
# share this workflow, selected by the `repository_dispatch` type:
#   - `ai-review-cost`  -> ai-review.json  (AI code review, e.g. GitHub Copilot)
#   - `claude-cost`     -> claude.json     (Claude Code tokens; a month-to-date running total,
#                                           sent from the maintainer's machine — a manual `gh api`
#                                           dispatch today, an opt-in pre-push hook later, see #142)
# Each carries client_payload { month: "YYYY-MM", usd: <number>, note? }. The figure is written
# to its data file on the orphan `cost-data` branch (never dev/main, so it triggers no code CI).
# No billing identity, endpoint, or token is stored in this public repo. See issue #76 / #128 / #142.
name: Cost contribution

on:
  repository_dispatch:
    types: [ai-review-cost, claude-cost]

permissions: {}

# Share the cost-data writer group with cost-collector.yml so the two can never race on a
# push to the cost-data branch.
concurrency:
  group: cost-data-write
  cancel-in-progress: false

jobs:
  record:
    name: Record the cost contribution
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the cost-data branch (never dev/main)
    steps:
      - name: Check out the cost-data branch
        uses: actions/checkout@v6
        with:
          ref: cost-data
          fetch-depth: 0
      - uses: actions/github-script@v9
        id: record
        env:
          MONTH: ${{ github.event.client_payload.month }}
          USD: ${{ github.event.client_payload.usd }}
          NOTE: ${{ github.event.client_payload.note }}
        with:
          script: |
            const fs = require('fs');
            const month = String(process.env.MONTH || '').trim();
            if (!/^\d{4}-(0[1-9]|1[0-2])$/.test(month)) {
              core.setFailed(`invalid month (expected YYYY-MM, 01-12): ${month}`);
              return;
            }
            const usd = Number(process.env.USD);
            if (!Number.isFinite(usd) || usd < 0) {
              core.setFailed(`invalid usd amount: ${process.env.USD}`);
              return;
            }
            // The dispatch type selects which feed file to write. Each lives at the root of the
            // cost-data branch (checked out above) and shares the record/commit/push logic below.
            // `stampUpdated` marks running month-to-date feeds (Claude) so the snapshot can show
            // "month-to-date, updated YYYY-MM-DD"; one-shot monthly feeds (Copilot) omit it.
            const FEEDS = {
              'ai-review-cost': {
                file: 'ai-review.json',
                noun: 'AI code-review',
                stampUpdated: false,
                about: "Monthly AI code-review cost (e.g. GitHub Copilot) voluntarily contributed by the maintainer for vox. Reported out-of-band via a repository_dispatch (type 'ai-review-cost') from the maintainer's separate billing context; no billing-account identity or mechanism is stored here. GitHub exposes no per-repository attribution, so figures are a good-faith monthly disclosure. tools/cost_collector.py reads this into the cost-ledger snapshot. Lives on the orphan cost-data branch so refreshes never trigger code CI.",
              },
              'claude-cost': {
                file: 'claude.json',
                noun: 'Claude token',
                stampUpdated: true,
                about: "Monthly Claude Code token cost (the AI assistant that writes vox's code) voluntarily disclosed by the maintainer. Reported out-of-band via a repository_dispatch (type 'claude-cost') — typically from a pre-push git hook running ccusage over the vox project — as a running month-to-date total; the 'updated' date marks the last refresh. Claude Code stores sessions per project, so unlike Copilot this is attributable to vox specifically. No billing-account identity is stored here. tools/cost_collector.py reads this into the cost-ledger snapshot. Lives on the orphan cost-data branch so refreshes never trigger code CI.",
              },
            };
            const feed = FEEDS[context.payload.action];
            if (!feed) {
              core.setFailed(`unexpected dispatch type: ${context.payload.action}`);
              return;
            }
            const path = feed.file;
            let data;
            try {
              data = JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch (err) {
              // Only bootstrap a genuinely MISSING file. An existing-but-corrupt/unreadable
              // file must fail loudly, never be silently overwritten (that would drop months).
              if (err.code !== 'ENOENT') {
                core.setFailed(`could not read/parse ${path}: ${err.message}`);
                return;
              }
              // Self-describing payload, same shape as the seeded file.
              data = { schema: 1, currency: 'USD', about: feed.about, months: {} };
            }
            data.months = data.months || {};
            const existing = data.months[month] || {};
            const entry = { usd: Math.round(usd * 100) / 100 };
            // Collapse whitespace to a single line and cap length, so a malformed or abusive
            // dispatch note cannot inject multi-line/oversized content into the committed JSON.
            const note = String(process.env.NOTE || '').replace(/\s+/g, ' ').trim().slice(0, 200);
            const keptNote = note || existing.note; // keep a prior note when this dispatch omits one
            if (keptNote) entry.note = keptNote;
            // Stamp the UTC date for running totals so the reader can label it month-to-date.
            if (feed.stampUpdated) entry.updated = new Date().toISOString().slice(0, 10);
            data.months[month] = entry;
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            core.setOutput('month', month);
            core.setOutput('file', feed.file);
            core.setOutput('noun', feed.noun);
            core.info(`recorded ${feed.noun} cost ${month}: $${entry.usd}`);
      - name: Commit and push to cost-data (no PR, no CI)
        env:
          # Use the VALIDATED outputs from the step above (month constrained to YYYY-MM; file
          # and noun are fixed strings from the FEEDS map), never the untrusted payload
          # interpolated into the shell.
          MONTH: ${{ steps.record.outputs.month }}
          FILE: ${{ steps.record.outputs.file }}
          NOUN: ${{ steps.record.outputs.noun }}
        run: |
          git config user.name "vox cost collector"
          git config user.email "actions@github.com"
          # Stage first so the guard also detects a newly-created (untracked) file, not
          # just a modification to a tracked one.
          git add "$FILE"
          if git diff --cached --quiet; then
            echo "$NOUN contribution unchanged; nothing to do."
            exit 0
          fi
          git commit -m "chore(cost): record $NOUN cost ($MONTH)"
          # Serialized by the concurrency group; rebase defensively in case a collector push
          # moved the branch between checkout and now, then push.
          git fetch origin cost-data
          git rebase origin/cost-data
          git push origin HEAD:cost-data
