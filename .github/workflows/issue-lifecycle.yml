# Automates issue status labels across the gitflow and tidies merged branches.
#
#   feature branch created  -> issue gets "In Progress"
#   PR merged into dev       -> "In Progress" -> "Resolved"; delete the feature branch;
#                               record the opt-in "Effort:" on linked issues (#76 cost ledger)
#   dev PR merged into main  -> all "Resolved" issues -> "Released" + closed
#   hotfix PR merged to main -> its linked issues -> "Released" + closed
#
# Branch convention: <type>/<issue-number>-<slug> (e.g. fix/8-...). The issue
# number is also read from the PR's "Closes #N" references.
#
# NOTE on GitHub semantics (observed):
#   - `create` runs this workflow from the NEWLY CREATED branch's copy, so the
#     "In Progress" step works as soon as a branch carrying this file is pushed
#     (e.g. branched from dev) — it does not need to be on main.
#   - `pull_request_target` runs from the DEFAULT branch (main), so the merge
#     steps (Resolved/Released + branch delete) only take effect once this file is
#     on main.
name: Issue lifecycle

on:
  create:
  pull_request_target:
    types: [closed]

# Least privilege: grant nothing at the workflow level; each job below requests
# only the scopes it actually uses (Sonar githubactions:S8233 / S8264).
permissions: {}

jobs:
  start:
    name: Mark In Progress on branch creation
    if: ${{ github.event_name == 'create' && github.event.ref_type == 'branch' }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write # read the issue and set its "In Progress" label
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const branch = context.payload.ref;
            const match = branch.match(/^[^/]+\/(\d+)(?:[-_/]|$)/);
            if (!match) {
              core.info(`Branch '${branch}' has no issue number; skipping.`);
              return;
            }
            const issue_number = Number(match[1]);
            try {
              const { data: issue } = await github.rest.issues.get({ ...context.repo, issue_number });
              if (issue.state !== 'open') {
                core.info(`Issue #${issue_number} is ${issue.state}; skipping.`);
                return;
              }
            } catch (error) {
              core.info(`Issue #${issue_number} not found; skipping.`);
              return;
            }
            for (const name of ['Resolved', 'Released']) {
              try {
                await github.rest.issues.removeLabel({ ...context.repo, issue_number, name });
              } catch (error) { /* label not present */ }
            }
            await github.rest.issues.addLabels({ ...context.repo, issue_number, labels: ['In Progress'] });
            core.info(`Marked #${issue_number} as In Progress.`);

  finish:
    name: Update labels on merge
    if: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merged == true }}
    runs-on: ubuntu-24.04
    permissions:
      issues: write # update labels and close the issue
      contents: write # delete the merged feature branch
      pull-requests: read # read the PR's "Closes #N" references
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const base = pr.base.ref;
            if (base !== 'dev' && base !== 'main') {
              core.info(`PR base '${base}' is not tracked; skipping.`);
              return;
            }

            // Collect issue numbers from the head branch name and "Closes #N".
            const issues = new Set();
            const branchMatch = pr.head.ref.match(/^[^/]+\/(\d+)(?:[-_/]|$)/);
            if (branchMatch) issues.add(Number(branchMatch[1]));
            const query = `query($owner:String!,$repo:String!,$num:Int!){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$num){
                  closingIssuesReferences(first:20){nodes{number}}}}}`;
            try {
              const result = await github.graphql(query, {
                owner: context.repo.owner, repo: context.repo.repo, num: pr.number,
              });
              for (const node of result.repository.pullRequest.closingIssuesReferences.nodes) {
                issues.add(node.number);
              }
            } catch (error) {
              core.info(`closingIssuesReferences lookup failed: ${error.message}`);
            }
            core.info(`Linked issues: ${[...issues].join(', ') || '(none)'}`);

            const remove = async (issue_number, names) => {
              for (const name of names) {
                try {
                  await github.rest.issues.removeLabel({ ...context.repo, issue_number, name });
                } catch (error) { /* label not present */ }
              }
            };

            // Same-repo guard: gates the dev->main bulk release (below) and the
            // branch deletion to the repo's own branches, so a fork's `dev`
            // cannot trigger a mass release. A merged fork PR can still update
            // its own linked issue via the per-issue path; only the bulk sweep
            // and branch deletion are same-repo-only.
            const sameRepo = Boolean(pr.head.repo && pr.head.repo.full_name === pr.base.repo.full_name);

            // A dev->main merge brings ALL of dev into main, so every "Resolved"
            // issue is released by it. The release PR's head is `dev` with no
            // per-issue "Closes", so acting on its linked issues would transition
            // nothing -- release exactly the "Resolved" set instead (open AND
            // closed, so a manually-closed one still drops "Resolved" for
            // "Released"). We deliberately do NOT union the PR's linked issues:
            // a stray `Closes #N` in the release notes must not release a
            // non-Resolved issue. Restricted to the repo's own `dev` so a fork
            // branch named `dev` can't trigger it; a direct hotfix to main
            // (head != dev) still releases only its own linked issues.
            let targets = issues;
            if (base === 'main' && pr.head.ref === 'dev' && sameRepo) {
              const resolved = (await github.paginate(github.rest.issues.listForRepo, {
                ...context.repo, state: 'all', labels: 'Resolved', per_page: 100,
              })).filter((i) => !i.pull_request);
              targets = new Set(resolved.map((i) => i.number));
              core.info(`Release: ${resolved.length} Resolved issue(s).`);
            }

            for (const issue_number of targets) {
              if (base === 'dev') {
                await remove(issue_number, ['In Progress']);
                await github.rest.issues.addLabels({ ...context.repo, issue_number, labels: ['Resolved'] });
              } else {
                await remove(issue_number, ['In Progress', 'Resolved']);
                await github.rest.issues.addLabels({ ...context.repo, issue_number, labels: ['Released'] });
                await github.rest.issues.update({ ...context.repo, issue_number, state: 'closed' });
              }
            }

            // Cost ledger (#76): record the opt-in developer-time effort on each linked
            // issue at feature->dev merge. The PR body is the squash-proof source of truth
            // (an `Effort:` line that is not HTML-commented out); effort.yml suggests it.
            if (base === 'dev') {
              // Strip HTML comments (single- and multi-line) first so a commented-out
              // Effort example is never treated as active; then parse h/m independently
              // from the text after "Effort:" so an all-optional regex cannot match the
              // empty string and silently record 0.
              const visible = (pr.body || '').replace(/<!--[\s\S]*?-->/g, '');
              const active = visible.split(/\r?\n/).find((l) => /^\s*Effort:/i.test(l));
              const rest = active ? active.replace(/^\s*Effort:\s*/i, '') : '';
              const hMatch = rest.match(/(\d+(?:\.\d+)?)\s*h/i);  // hours may be fractional (e.g. 0.25h)
              const mMatch = rest.match(/(\d+(?:\.\d+)?)\s*m/i);
              const minutes = Math.round((hMatch ? Number(hMatch[1]) : 0) * 60 + (mMatch ? Number(mMatch[1]) : 0));
              if (minutes > 0) {
                const hours = Math.floor(minutes / 60);
                const dur = [hours ? `${hours}h` : '', minutes % 60 ? `${minutes % 60}m` : ''].filter(Boolean).join(' ');
                const marker = '<!-- vox-effort-record -->';
                const tag = `(PR #${pr.number})`;
                const body = `${marker}\nEffort: ${dur} ${tag}`;
                for (const issue_number of issues) {
                  try {
                    // Idempotent: update this PR's existing record comment if present,
                    // so a re-run / re-delivered event does not stack duplicates.
                    const comments = await github.paginate(github.rest.issues.listComments, {
                      ...context.repo, issue_number, per_page: 100,
                    });
                    const existing = comments.find((c) => c.body && c.body.includes(marker) && c.body.includes(tag));
                    if (existing) {
                      await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
                    } else {
                      await github.rest.issues.createComment({ ...context.repo, issue_number, body });
                    }
                  } catch (error) {
                    core.info(`Effort record on #${issue_number} failed: ${error.message}`);
                  }
                }
                core.info(`Recorded effort ${dur} on ${issues.size} issue(s).`);
              }
            }

            // Delete the merged feature branch (same-repo only; never dev/main).
            if (sameRepo && pr.head.ref !== 'dev' && pr.head.ref !== 'main') {
              try {
                await github.rest.git.deleteRef({ ...context.repo, ref: `heads/${pr.head.ref}` });
                core.info(`Deleted branch ${pr.head.ref}.`);
              } catch (error) {
                core.info(`Branch ${pr.head.ref} already deleted.`);
              }
            }
