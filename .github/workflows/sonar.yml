name: SonarQube
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Analyze
    runs-on: windows-latest
    env:
      VCPKG_BASELINE: ${{ vars.VCPKG_BASELINE }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: amd64
      # run-vcpkg runs AFTER the MSVC env so its VCPKG_ROOT is not clobbered by
      # the vcvars that ship with Visual Studio's bundled vcpkg.
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Configure
        run: cmake --preset x64-msvc
      # Debug build so the binaries carry the PDB line info OpenCppCoverage needs.
      - name: Build
        run: cmake --build --preset x64-msvc-debug
      - name: Install OpenCppCoverage
        run: choco install OpenCppCoverage --version=0.9.9.0 -y --no-progress
      # Run the suite under coverage and export Cobertura for Sonar. --sources
      # limits measurement to our own src/ (not vcpkg/STL); --modules to our build
      # output; --cover_children so the test executables ctest spawns are covered.
      # The device/voice integration tests skip here (no hardware) -- that OS glue
      # is integration-tested, not coverage-gated (sonar.coverage.exclusions, 8.6.2).
      - name: Test with coverage
        shell: pwsh
        run: |
          $occ = "C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe"
          & $occ `
            --sources "$env:GITHUB_WORKSPACE\src" `
            --modules "$env:GITHUB_WORKSPACE\build" `
            --cover_children `
            --export_type "cobertura:$env:GITHUB_WORKSPACE\coverage.xml" `
            -- ctest --preset x64-msvc-debug
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

