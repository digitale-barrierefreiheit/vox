name: SonarQube
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: amd64
      # run-vcpkg runs AFTER the MSVC env so its VCPKG_ROOT is not clobbered by
      # the vcvars that ship with Visual Studio's bundled vcpkg.
      - uses: ./.github/actions/vcpkg-baseline
      - name: Set up vcpkg (pinned to the manifest baseline)
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_BASELINE }}
      - name: Install OpenCppCoverage
        run: choco install OpenCppCoverage --version=0.9.9.0 -y --no-progress
      # `just coverage` builds the Debug config (the PDB line info OpenCppCoverage
      # needs) and runs the suite under coverage, exporting Cobertura for Sonar — the
      # exact invocation developers run locally. It limits measurement to our src/
      # (not vcpkg/STL) and covers the test exes ctest spawns. The device/voice
      # integration tests skip here (no hardware): that OS glue is integration-tested,
      # not coverage-gated (sonar.coverage.exclusions, 8.6.2).
      - name: Test with coverage
        run: just coverage x64-msvc-debug
        env:
          VOX_OCC: C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # Write the actual quality-gate status + new-code coverage into the run Summary by
      # querying SonarCloud's API (the same values SonarCloud posts as PR decoration).
      - name: Quality gate summary
        if: always()
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          api="https://sonarcloud.io/api"
          pr="${PR:+&pullRequest=$PR}"
          gate=$(curl -sf -u "$SONAR_TOKEN:" "$api/qualitygates/project_status?projectKey=vox${pr}" \
                 | grep -o '"status":"[A-Z]*"' | head -1 | cut -d'"' -f4 || true)
          cov=$(curl -sf -u "$SONAR_TOKEN:" "$api/measures/component?component=vox&metricKeys=new_coverage${pr}" \
                 | grep -o '"value":"[0-9.]*"' | head -1 | cut -d'"' -f4 || true)
          case "$gate" in
            OK) badge="✅ Passed" ;;
            ERROR) badge="❌ Failed" ;;
            *) badge="❔ ${gate:-unknown}" ;;
          esac
          {
            echo "## 🔍 SonarQube"
            echo "| Metric | Result |"
            echo "|---|---|"
            echo "| Quality gate | $badge |"
            echo "| New-code coverage | ${cov:-n/a}% |"
            echo ""
            echo "[SonarCloud new-code dashboard](https://sonarcloud.io/summary/new_code?id=vox)"
          } >> "$GITHUB_STEP_SUMMARY"

