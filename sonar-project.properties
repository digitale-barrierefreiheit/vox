sonar.projectKey=vox
sonar.organization=digitale-barrierefreiheit

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=Vox

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# Give the C/C++ analyzer the full compilation model (exact flags, defines, and
# include paths per translation unit) instead of letting it guess. CMake writes
# this compilation database at configure time (CMAKE_EXPORT_COMPILE_COMMANDS=ON);
# the Sonar CI job configures + builds before scanning, so the generated headers
# it references exist. This is the CMake-native alternative to the build-wrapper.
sonar.cfamily.compile-commands=build/x64-msvc/compile_commands.json

# ---------------------------------------------------------------------------
# Coverage (see architecture 8.6.2). The OS-glue adapters (WASAPI sink, SAPI
# engine, UIA provider, keyboard hook) are unit-covered with no real
# device/voice/hook: a test seam injects mock COM objects (or, for the keyboard
# hook, a fake SetWindowsHookEx) so their acquisition, error, and decision paths
# run in the coverage job (issue #68). The application itself is a testable App
# object (DI run-loop, covered with fakes) plus a composition-root factory
# (makeDefaultDependencies, covered via the SAPI seam); main() is a one-line
# entry point that just wires them. So no production source is excluded -- only
# the tests, which do not measure their own coverage. The report is produced by
# the Sonar CI job (OpenCppCoverage -> Cobertura).
# ---------------------------------------------------------------------------
sonar.cfamily.cobertura.reportPaths=coverage.xml
sonar.coverage.exclusions=\
  tests/**

# Duplication detection is scoped to production code. The test doubles are
# inherently repetitive -- a stubbed override per method across the (large) COM
# vtables we mock (one *_com_mocks.hpp per adapter), plus the per-test arrange
# scaffolding -- and that repetition is not a maintainability signal the way
# duplicated production logic is. So tests are excluded from copy/paste analysis
# (production src/ is still measured).
sonar.cpd.exclusions=\
  tests/**

# ---------------------------------------------------------------------------
# Justified, version-controlled suppressions (issue #62).
#
# Each entry below is a finding we deliberately do NOT fix because it conflicts
# with a documented decision or this project's architecture. We suppress it here
# -- reviewable in git -- instead of silently resolving it in the Sonar UI, per
# AGENTS.md and architecture 8.6.7. Everything NOT listed here is expected to be
# fixed in code.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=\
  e_memorder,\
  e_fw_s1181,e_fw_s2486_reader,e_fw_s2486_uia,\
  e_fw_s2738_reader,e_fw_s2738_hook,e_fw_s2738_uia,e_fw_s2738_sapi,\
  e_fw_s108_reader,\
  e_abi_voidptr,e_abi_recast_wasapi,e_abi_recast_hook,e_abi_depth,\
  e_setrate_const,e_test_escape,\
  e_test_protected,e_test_free

# S8417 ("use seq_cst / drop the explicit memory order"). Suppressed repo-wide
# (resourceKey=**/*) by design: deliberate non-seq_cst orders appear across our
# atomics -- the lock-free SPSC ring and audio render path (where seq_cst would
# add hot-path latency for no correctness gain), plus the lighter acquire/release
# flags in the reader, keyboard hook, and TTS engine. All are ThreadSanitizer-
# verified (8.3, 8.6.3, ADR-14); TSan -- not Sonar's static heuristic -- is the
# authoritative gate for memory ordering, so this rule is only noise here.
sonar.issue.ignore.multicriteria.e_memorder.ruleKey=cpp:S8417
sonar.issue.ignore.multicriteria.e_memorder.resourceKey=**/*

# (cpp:S6168 std::thread->std::jthread and cpp:S112 dedicated-exception are no
# longer suppressed: #63 migrated the worker/render/hook threads to std::jthread
# and introduced the vox::OsError taxonomy -- vox::audio::DeviceError /
# vox::tts::EngineError / vox::input::HookError -- for the 25 former throw sites.)

# S1181 / S2486 / S2738 / S108 -- the deliberate exception firewalls at the
# thread, destructor, COM, and keyboard-hook boundaries. A fault there must
# never crash the host (R15, 8.6.7), so a catch(...) that swallows is correct
# and cannot be narrowed without defeating the firewall. Scoped narrowly -- the
# specific OS-glue sources below, plus the integration tests' device/voice setup
# catch-all (*_itest.cpp) -- so these rules stay active everywhere else.
sonar.issue.ignore.multicriteria.e_fw_s1181.ruleKey=cpp:S1181
sonar.issue.ignore.multicriteria.e_fw_s1181.resourceKey=tests/**/*_itest.cpp
sonar.issue.ignore.multicriteria.e_fw_s2486_reader.ruleKey=cpp:S2486
sonar.issue.ignore.multicriteria.e_fw_s2486_reader.resourceKey=src/app/src/reader.cpp
sonar.issue.ignore.multicriteria.e_fw_s2486_uia.ruleKey=cpp:S2486
sonar.issue.ignore.multicriteria.e_fw_s2486_uia.resourceKey=src/provider/src/uia_provider.cpp
sonar.issue.ignore.multicriteria.e_fw_s2738_reader.ruleKey=cpp:S2738
sonar.issue.ignore.multicriteria.e_fw_s2738_reader.resourceKey=src/app/src/reader.cpp
sonar.issue.ignore.multicriteria.e_fw_s2738_hook.ruleKey=cpp:S2738
sonar.issue.ignore.multicriteria.e_fw_s2738_hook.resourceKey=src/input/src/keyboard_hook.cpp
sonar.issue.ignore.multicriteria.e_fw_s2738_uia.ruleKey=cpp:S2738
sonar.issue.ignore.multicriteria.e_fw_s2738_uia.resourceKey=src/provider/src/uia_provider.cpp
sonar.issue.ignore.multicriteria.e_fw_s2738_sapi.ruleKey=cpp:S2738
sonar.issue.ignore.multicriteria.e_fw_s2738_sapi.resourceKey=src/tts/src/sapi_tts_engine.cpp
sonar.issue.ignore.multicriteria.e_fw_s108_reader.ruleKey=cpp:S108
sonar.issue.ignore.multicriteria.e_fw_s108_reader.resourceKey=src/app/src/reader.cpp

# S5008 (void*), S3630 (reinterpret_cast), S110 (deep inheritance) -- forced by
# the Win32 + COM ABI at the OS-glue seam (ADR-12): the SAPI callback context is
# a void*, lParam must be reinterpret_cast to KBDLLHOOKSTRUCT*, the render buffer
# to BYTE*, and the WRL RuntimeClass COM hierarchy is 8 deep. Scoped to glue.
sonar.issue.ignore.multicriteria.e_abi_voidptr.ruleKey=cpp:S5008
sonar.issue.ignore.multicriteria.e_abi_voidptr.resourceKey=src/tts/src/sapi_tts_engine.cpp
sonar.issue.ignore.multicriteria.e_abi_recast_wasapi.ruleKey=cpp:S3630
sonar.issue.ignore.multicriteria.e_abi_recast_wasapi.resourceKey=src/audio/src/wasapi_audio_sink.cpp
sonar.issue.ignore.multicriteria.e_abi_recast_hook.ruleKey=cpp:S3630
sonar.issue.ignore.multicriteria.e_abi_recast_hook.resourceKey=src/input/src/keyboard_hook.cpp
sonar.issue.ignore.multicriteria.e_abi_depth.ruleKey=cpp:S110
sonar.issue.ignore.multicriteria.e_abi_depth.resourceKey=src/tts/src/sapi_tts_engine.cpp

# S5817 ("declare const") on SapiTtsEngine::Impl::setRate. The method touches no
# Impl member, but it is a semantic *setter* -- it changes the engine's speech
# rate via ISpVoice::SetRate. Marking it const would be misleading and would let a
# mutating setter be called on a const engine, so we keep it non-const.
sonar.issue.ignore.multicriteria.e_setrate_const.ruleKey=cpp:S5817
sonar.issue.ignore.multicriteria.e_setrate_const.resourceKey=src/tts/src/sapi_tts_engine.cpp

# S7040 (bounded numeric escape) on the UTF-8 byte-literal test. The existing
# "\xC3\x9C" is already terminator-bounded; the C++23 delimited "\x{..}" form the
# rule wants does not compile on our pinned CI MSVC toolset (19.44), and the test
# deliberately spells out the raw UTF-8 bytes it round-trips.
sonar.issue.ignore.multicriteria.e_test_escape.ruleKey=cpp:S7040
sonar.issue.ignore.multicriteria.e_test_escape.resourceKey=tests/model/accessible_node_test.cpp

# Test-framework conventions. S3656 (protected members) is how GoogleTest
# fixtures expose state to TEST_F bodies; S1231 (free) pairs with _dupenv_s,
# whose contract mandates free(). Scoped to tests only.
sonar.issue.ignore.multicriteria.e_test_protected.ruleKey=cpp:S3656
sonar.issue.ignore.multicriteria.e_test_protected.resourceKey=tests/**/*
sonar.issue.ignore.multicriteria.e_test_free.ruleKey=cpp:S1231
sonar.issue.ignore.multicriteria.e_test_free.resourceKey=tests/**/*
